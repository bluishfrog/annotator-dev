<!DOCTYPE html>
<html lang="en">

<head>
    <div id="head-placeholder"></div>
    <script src="js/loadComponents.js"></script>
</head>

<body>

    <div class="page-wrapper">

        <!-- NAV -->
        <div id="nav-placeholder"></div>


        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- Split Screen for preview -->
            <div class="level1-container">

                <!-- left side of annotator, where the preview is -->
                <div class="level1-section">
                    <iframe id="preview-frame" src="ao3preview.html"
                        style="width:100%; height:100%; border:none;"></iframe>
                </div>

                <!-- right side of builder, where the upload confg and comment preview is -->
                <div class="level1-section">

                    <div class="level2-container">

                        <div class="level2-card">
                            <h3>HTML file to annotate</h3>
                            <div class="preview-plus-button">
                                <div class="container-file-preview">
                                    <div class="file-preview" id="HTMLFile">No HTML file selected</div>
                                </div>
                                <div class="file-actions">
                                    <button onclick="assignHTMLFile()">Select HTML file</button>
                                </div>
                            </div>
                        </div>

                        <div class="level2-card">
                            <h3>Comment preview</h3>
                            <p>Placeholder</p>


                        </div>
                    </div>

                </div>



            </div>

        </main>


        <!-- FOOTER -->
        <div id="footer-placeholder"></div>

    </div>

    <!-- SCRIPTS -->
    <script src="js/loadComponents.js"></script>

</body>

</html>
