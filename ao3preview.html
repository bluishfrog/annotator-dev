<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ao3 Preview</title>

  <style>
    /* Force override ALL link colors inside preview */
    #htmlpreview a,
    #htmlpreview a:visited,
    #htmlpreview a:active {
      color: #33337C !important;
    }
  </style>

</head>

<body>
  <div id="preview-root"></div>

  <script>
    fetch('test_data/Racing_for_a_Dream.html')
      .then(response => response.text())
      .then(html => {
        // Wrap the Ao3 content inside a div with id "workskin"
        document.getElementById('preview-root').innerHTML = `<div id="htmlpreview">${html}</div>`;
      })
      .catch(err => {
        document.getElementById('preview-root').innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>
</body>

</html>
