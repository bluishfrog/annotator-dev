<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ao3 Preview</title>

  <style>
    /* Force override ALL link colors inside preview */
    #htmlpreview a,
    #htmlpreview a:visited,
    #htmlpreview a:active {
      color: #33337C !important;
    }
  </style>

</head>

<body>
  <div id="preview-root"></div>

  <script>
    function loadPlaceholder() {
      fetch('components/nofileselected.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('preview-root').innerHTML =
            `<div id="htmlpreview">${html}</div>`;
        });
    }

    // default state
    loadPlaceholder();
  </script>

</body>

</html>
